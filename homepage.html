<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>

<body class="min-h-screen">
        <div class="flex justify-between mt-10 ml-5 mr-5">
            <div class=" font-semibold"> 👤 <span id="currentuser"></span> </div>

       <div class="flex gap-3">
        <button onclick="clearAll()" class="text-white px-3 py-1 bg-cyan-600 rounded hover:bg-cyan-700">Clear</button>
        <button onclick="logoutbtn()" class="text-white px-3 py-1 bg-blue-400 rounded hover:bg-blue-500">Logout</button>
       
    </div>
        </div>
    <div class="text-center mt-10">
    <h1 class="text-5xl font-bold text-blue-800"><span class="text-black">T</span> RacKer</h1>
</div>
   <div class="flex justify-center gap-10 mt-16">
    <div class="w-72 bg-rose-200 rounded-lg p-6 shadow-lg hover:scale-105 transition">
        <h2 class="text-center text-xl font-semibold">Balance</h2>
        <h3 id="incomespace" class="text-center text-2xl mt-4 font-bold"></h3>
    </div>

    <div class="w-72 bg-sky-200 rounded-lg p-6 shadow-lg hover:scale-105 transition">
        <h2 class="text-center text-xl font-semibold">Expense</h2>
        <h3 id="expensespace" class="text-center text-2xl mt-4 font-bold"></h3>
    </div>
</div>

<!-- INPUTS -->
<div class="flex justify-center gap-20 mt-16">

    <!-- INCOME -->
    <div>
        <h2 class="text-xl font-bold text-rose-500">Add Income</h2>
        <input id="incometype" class="block mt-3 p-2 w-64 rounded focus:ring-2 focus:ring-blue-400 outline-none" placeholder="Type">
        <input id="incomerp" class="block mt-3 p-2 w-64 rounded focus:ring-2 focus:ring-blue-400 outline-none" placeholder="Amount">
        <button onclick="incomeaddbtn()" class="mt-5 w-64 bg-green-300 p-2 rounded hover:bg-green-400 active:scale-95 transition">
            Add Income
        </button>
    </div>

    <!-- EXPENSE -->
    <div>
        <h2 class="text-xl font-bold text-sky-500">Add Expense</h2>
        <input id="expensetype" class="block mt-3 p-2 w-64 rounded focus:ring-2 focus:ring-blue-400 outline-none" placeholder="Type">
        <input id="expenseamt" class="block mt-3 p-2 w-64 rounded focus:ring-2 focus:ring-blue-400 outline-none" placeholder="Amount">
        <button onclick="expenseaddbtn()" class="mt-5 w-64 bg-green-300 p-2 rounded hover:bg-green-400 active:scale-95 transition">
            Add Expense
        </button>
    </div>

</div>

<!-- TABLES -->
<div class="mt-20 px-10">
    <h2 class="text-center text-3xl font-bold text-blue-900 mb-10">Transactions</h2>

    <div class="grid grid-cols-2 gap-10">
        <table class="bg-white shadow rounded">
            <thead class="bg-gray-200">
                <tr>
                    <th>Type</th>
                    <th>Amount</th>
                    <th>Balance</th>
                    <th>Time</th>
                </tr>
            </thead>
            <tbody id="incomeTableBody"></tbody>
        </table>

        <table class="bg-white shadow rounded">
            <thead class="bg-gray-200">
                <tr>
                    <th>Type</th>
                    <th>Amount</th>
                    <th>Balance</th>
                    <th>Time</th>
                </tr>
            </thead>
            <tbody id="expenseTableBody"></tbody>
        </table>
            </div>
        </div>
    </div>
    <script>
const currentuser = document.getElementById("currentuser");
const currentUser = localStorage.getItem("currentuser");

if (!currentUser) {
    window.location.href = "login.html";
}

// Show username
currentuser.innerHTML = `Welcome ${currentUser}`;

// Helper for per-user storage
function userKey(key) {
    return `${currentUser}_${key}`;
}

//  Load user-specific data
let totalIncome = Number(localStorage.getItem(userKey("totalIncome")) || 0);
let totalExpense = Number(localStorage.getItem(userKey("totalExpense")) || 0);
let balance = Number(localStorage.getItem(userKey("balance")) || 0);

//  Load saved tables
document.getElementById("incomeTableBody").innerHTML =
    localStorage.getItem(userKey("incomeTable")) || "";

document.getElementById("expenseTableBody").innerHTML =
    localStorage.getItem(userKey("expenseTable")) || "";

// Update UI
document.getElementById("incomespace").innerText = `$${balance}`;
document.getElementById("expensespace").innerText = `$${totalExpense}`;


// ================= INCOME =================
function incomeaddbtn() {
    const incometype = document.getElementById("incometype").value.trim();
    const amount = Number(document.getElementById("incomerp").value.trim());

    if (!incometype || isNaN(amount) || amount <= 0) {
        alert("Enter valid income details");
        return;
    }

    totalIncome += amount;
    balance += amount;

    localStorage.setItem(userKey("totalIncome"), totalIncome);
    localStorage.setItem(userKey("balance"), balance);

    document.getElementById("incomespace").innerText = `$${balance}`;

    const row = `
        <tr>
            <td class="pr-15">${incometype}</td>
            <td class="pr-15">$${amount}</td>
            <td class="pr-15">$${balance}</td>
            <td class="pr-15">${new Date().toLocaleString()}</td>
        </tr>
    `;

    const tbody = document.getElementById("incomeTableBody");
    tbody.innerHTML += row;

    localStorage.setItem(userKey("incomeTable"), tbody.innerHTML);

    document.getElementById("incometype").value = "";
    document.getElementById("incomerp").value = "";
}


// ================= EXPENSE =================
function expenseaddbtn() {
    const expensetype = document.getElementById("expensetype").value.trim();
    const amount = Number(document.getElementById("expenseamt").value.trim());

    if (!expensetype || isNaN(amount) || amount <= 0) {
        alert("Enter valid expense details");
        return;
    }

    //  Prevent negative balance
    if (amount > balance) {
        alert("Not enough balance!");
        return;
    }

    totalExpense += amount;
    balance -= amount;

    localStorage.setItem(userKey("totalExpense"), totalExpense);
    localStorage.setItem(userKey("balance"), balance);

    document.getElementById("expensespace").innerText = `$${totalExpense}`;
    document.getElementById("incomespace").innerText = `$${balance}`;

    const row = `
        <tr>
            <td class="pr-15">${expensetype}</td>
            <td class="pr-15">$${amount}</td>
            <td class="pr-15">$${balance}</td>
            <td class="pr-15">${new Date().toLocaleString()}</td>
        </tr>
    `;

    const tbody = document.getElementById("expenseTableBody");
    tbody.innerHTML += row;

    localStorage.setItem(userKey("expenseTable"), tbody.innerHTML);

    document.getElementById("expensetype").value = "";
    document.getElementById("expenseamt").value = "";
}


// ================= CLEAR =================
function clearAll() {
    if (!confirm("Are you sure you want to clear all records?")) return;

    totalIncome = 0;
    totalExpense = 0;
    balance = 0;

    //  Properly remove user data
    localStorage.removeItem(userKey("totalIncome"));
    localStorage.removeItem(userKey("totalExpense"));
    localStorage.removeItem(userKey("balance"));
    localStorage.removeItem(userKey("incomeTable"));
    localStorage.removeItem(userKey("expenseTable"));

    document.getElementById("incomespace").innerText = "$0";
    document.getElementById("expensespace").innerText = "$0";
    document.getElementById("incomeTableBody").innerHTML = "";
    document.getElementById("expenseTableBody").innerHTML = "";
}


// ================= LOGOUT =================
function logoutbtn() {
    localStorage.removeItem("currentuser");
    window.location.href = "login.html";
}
</script>

       
</body>

</html>
